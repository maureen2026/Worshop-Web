<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airbnb – Find places to stay</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ── LeadManager Design System Tokens ── */
    :root {
      --red:          #FF0000;
      --teal:         #03989E;
      --dark-gray:    #454550;
      --body-gray:    #6A6A73;
      --medium-gray:  #808080;
      --text-link:    #808083;
      --light-gray:   #E0E0E0;
      --bg-page:      #F7F7F7;
      --bg-alt:       #F7F8FA;
      --bg-card:      #FBFBFB;
      --surface:      #FFFFFF;
      --success:      #0DA738;
      --warning:      #FDA51A;
      --error-light:  #FFE8E8;

      --f-display: 'Barlow', 'Neuzeit Grotesk', system-ui, sans-serif;
      --f-body:    'Roboto', system-ui, sans-serif;

      --s1: 8px;
      --s2: 16px;
      --s3: 24px;
      --s4: 32px;
      --s5: 40px;
      --s6: 48px;

      --r-sm: 4px;
      --r-md: 8px;

      --shadow-card: 0px 0px 1px rgba(0,0,0,0.25), 0px 1px 1px rgba(0,0,0,0.1);
      --shadow-panel: 0px 4px 20px rgba(0,0,0,0.12), 0px 0px 1px rgba(0,0,0,0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--f-body);
      background: var(--bg-page);
      color: var(--dark-gray);
    }

    /* ── Navbar ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--s2) var(--s4);
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--red);
      font-family: var(--f-display);
      font-weight: 700;
      font-size: 20px;
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .logo svg { width: 26px; height: 26px; fill: var(--red); }

    .nav-link {
      font-family: var(--f-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--dark-gray);
      text-decoration: none;
      letter-spacing: .02em;
    }

    .nav-link:hover { text-decoration: underline; }

    /* ── Hero ── */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 500px;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .hero-scene {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 70% 60%, #1a8a6c33 0%, transparent 70%),
        radial-gradient(ellipse 80% 50% at 80% 80%, #2e7d5288 0%, transparent 60%),
        linear-gradient(175deg, #87ceeb 0%, #5baecc 30%, #3d9970 55%, #2e7d52 75%, #1a5c3a 100%);
    }

    /* ── Search card ── */
    .search-card {
      position: relative;
      z-index: 5;
      background: var(--surface);
      border-radius: 11px;
      padding: var(--s3) var(--s3) var(--s2);
      width: 360px;
      margin-left: var(--s6);
      box-shadow: var(--shadow-panel);
    }

    .search-card h1 {
      font-family: var(--f-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--dark-gray);
      line-height: 1.25;
      letter-spacing: -0.01em;
      margin-bottom: var(--s1);
    }

    .search-card p {
      font-family: var(--f-body);
      font-size: 13px;
      font-weight: 400;
      color: var(--body-gray);
      line-height: 1.5;
      margin-bottom: var(--s2);
    }

    /* ── Field ── */
    .field {
      border: 1px solid var(--light-gray);
      border-radius: var(--r-md);
      padding: 10px 12px;
      margin-bottom: var(--s1);
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field:hover  { border-color: #b0b0b0; }
    .field.active {
      border-color: var(--dark-gray);
      box-shadow: 0 0 0 2px rgba(69,69,80,0.12);
    }

    .field label {
      display: block;
      font-family: var(--f-body);
      font-size: 10px;
      font-weight: 700;
      color: var(--medium-gray);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 3px;
      pointer-events: none;
    }

    .field input {
      width: 100%;
      border: none;
      outline: none;
      font-family: var(--f-body);
      font-size: 13px;
      font-weight: 400;
      color: var(--dark-gray);
      background: transparent;
      cursor: pointer;
    }

    .field input::placeholder { color: var(--medium-gray); }

    /* ── Location wrapper ── */
    .location-wrapper { position: relative; margin-bottom: var(--s1); }

    /* ── Dropdown panel ── */
    .location-panel {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--light-gray);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-panel);
      z-index: 100;
      overflow: hidden;
    }

    .location-panel.open { display: block; }

    /* Tier tabs */
    .tier-tabs {
      display: flex;
      border-bottom: 1px solid var(--light-gray);
    }

    .tier-tab {
      flex: 1;
      padding: 10px 8px;
      font-family: var(--f-body);
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      color: var(--medium-gray);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: .08em;
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
    }

    .tier-tab.active   { color: var(--dark-gray); border-bottom-color: var(--dark-gray); }
    .tier-tab.disabled { opacity: 0.35; cursor: not-allowed; }

    /* Option list */
    .option-list {
      max-height: 196px;
      overflow-y: auto;
      padding: 4px 0;
    }

    .option-list::-webkit-scrollbar { width: 4px; }
    .option-list::-webkit-scrollbar-thumb { background: var(--light-gray); border-radius: 4px; }

    .option-item {
      padding: 9px var(--s2);
      font-family: var(--f-body);
      font-size: 13px;
      font-weight: 400;
      color: var(--dark-gray);
      cursor: pointer;
    }

    .option-item:hover    { background: var(--bg-alt); }
    .option-item.selected {
      background: var(--error-light);
      color: var(--red);
      font-weight: 500;
    }

    /* ── Two-column row ── */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--s1);
      margin-bottom: var(--s1);
    }

    .row-2 .field { margin-bottom: 0; }

    /* ── Stepper ── */
    .stepper-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--s1);
      margin-bottom: var(--s2);
    }

    .stepper-field {
      border: 1px solid var(--light-gray);
      border-radius: var(--r-md);
      padding: 10px 12px;
    }

    .stepper-field label {
      display: block;
      font-family: var(--f-body);
      font-size: 10px;
      font-weight: 700;
      color: var(--medium-gray);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 6px;
    }

    .stepper {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stepper button {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--light-gray);
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      color: var(--body-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: border-color 0.15s, color 0.15s;
    }

    .stepper button:hover { border-color: var(--dark-gray); color: var(--dark-gray); }

    .stepper span {
      font-family: var(--f-body);
      font-size: 14px;
      font-weight: 500;
      color: var(--dark-gray);
    }

    /* ── Primary Button ── */
    .btn-search {
      width: 100%;
      padding: 10px var(--s3);
      background: var(--red);
      color: var(--surface);
      border: none;
      border-radius: var(--r-md);
      font-family: var(--f-display);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .06em;
      cursor: pointer;
      transition: opacity 0.15s;
      text-transform: uppercase;
    }

    .btn-search:hover  { opacity: 0.88; }
    .btn-search:active { opacity: 0.75; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <a class="logo" href="#">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 1C10.925 1 6 6.925 6 13.5c0 7.313 7.781 16.156 9.094 17.625a1.25 1.25 0 001.812 0C18.219 29.656 26 20.813 26 13.5 26 6.925 21.075 1 16 1zm0 17.5a5 5 0 110-10 5 5 0 010 10z"/>
      </svg>
      airbnb
    </a>
    <a class="nav-link" href="#">Airbnb your place</a>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-scene"></div>

    <div class="search-card">
      <h1>Find places to stay in Page</h1>
      <p>Great getaways start on Airbnb, with unique homes for every kind of trip.</p>

      <!-- Location dropdown -->
      <div class="location-wrapper">
        <div class="field" id="locationField" onclick="togglePanel()">
          <label>Location</label>
          <input type="text" id="locationInput" placeholder="Select country, state, city…" readonly>
        </div>

        <div class="location-panel" id="locationPanel">
          <div class="tier-tabs">
            <div class="tier-tab active"   id="tab-country" onclick="switchTab('country')">Country</div>
            <div class="tier-tab disabled" id="tab-state"   onclick="switchTab('state')">State</div>
            <div class="tier-tab disabled" id="tab-city"    onclick="switchTab('city')">City</div>
          </div>
          <div class="option-list" id="optionList"></div>
        </div>
      </div>

      <!-- Check in / Check out -->
      <div class="row-2">
        <div class="field">
          <label>Check in</label>
          <input type="text" placeholder="Add dates">
        </div>
        <div class="field">
          <label>Check out</label>
          <input type="text" placeholder="Add dates">
        </div>
      </div>

      <!-- Adults / Children -->
      <div class="stepper-row">
        <div class="stepper-field">
          <label>Adults</label>
          <div class="stepper">
            <button onclick="adjust('adults',-1)">−</button>
            <span id="adults">2</span>
            <button onclick="adjust('adults',1)">+</button>
          </div>
        </div>
        <div class="stepper-field">
          <label>Children</label>
          <div class="stepper">
            <button onclick="adjust('children',-1)">−</button>
            <span id="children">0</span>
            <button onclick="adjust('children',1)">+</button>
          </div>
        </div>
      </div>

      <button class="btn-search">Search</button>
    </div>
  </section>

  <script>
    const DATA = {
      countries: [{ code: 'US', name: 'United States', flag: '🇺🇸' }],
      states: {
        US: ['Alabama','Alaska','Arizona','Arkansas','California','Colorado',
          'Connecticut','Delaware','Florida','Georgia','Hawaii','Idaho',
          'Illinois','Indiana','Iowa','Kansas','Kentucky','Louisiana',
          'Maine','Maryland','Massachusetts','Michigan','Minnesota',
          'Mississippi','Missouri','Montana','Nebraska','Nevada',
          'New Hampshire','New Jersey','New Mexico','New York',
          'North Carolina','North Dakota','Ohio','Oklahoma','Oregon',
          'Pennsylvania','Rhode Island','South Carolina','South Dakota',
          'Tennessee','Texas','Utah','Vermont','Virginia','Washington',
          'West Virginia','Wisconsin','Wyoming']
      },
      cities: {
        'Alabama':        ['Birmingham','Huntsville','Mobile','Montgomery','Tuscaloosa'],
        'Alaska':         ['Anchorage','Fairbanks','Juneau','Sitka'],
        'Arizona':        ['Chandler','Gilbert','Glendale','Mesa','Page','Phoenix','Scottsdale','Tempe','Tucson'],
        'Arkansas':       ['Fayetteville','Fort Smith','Jonesboro','Little Rock','Springdale'],
        'California':     ['Fresno','Long Beach','Los Angeles','Oakland','Sacramento','San Diego','San Francisco','San Jose'],
        'Colorado':       ['Aurora','Colorado Springs','Denver','Fort Collins','Lakewood'],
        'Connecticut':    ['Bridgeport','Hartford','New Haven','Stamford','Waterbury'],
        'Delaware':       ['Dover','Newark','Wilmington'],
        'Florida':        ['Cape Coral','Hialeah','Jacksonville','Miami','Orlando','St. Petersburg','Tallahassee','Tampa'],
        'Georgia':        ['Athens','Atlanta','Augusta','Columbus','Savannah'],
        'Hawaii':         ['Hilo','Honolulu','Kailua','Kaneohe','Pearl City'],
        'Idaho':          ['Boise',"Coeur d'Alene",'Idaho Falls','Meridian','Nampa'],
        'Illinois':       ['Aurora','Chicago','Joliet','Naperville','Rockford','Springfield'],
        'Indiana':        ['Evansville','Fort Wayne','Indianapolis','South Bend'],
        'Iowa':           ['Cedar Rapids','Davenport','Des Moines','Sioux City'],
        'Kansas':         ['Kansas City','Olathe','Overland Park','Topeka','Wichita'],
        'Kentucky':       ['Bowling Green','Covington','Lexington','Louisville','Owensboro'],
        'Louisiana':      ['Baton Rouge','Lafayette','New Orleans','Shreveport'],
        'Maine':          ['Augusta','Bangor','Portland'],
        'Maryland':       ['Annapolis','Baltimore','Bowie','Frederick','Gaithersburg'],
        'Massachusetts':  ['Boston','Cambridge','Lowell','Springfield','Worcester'],
        'Michigan':       ['Ann Arbor','Detroit','Flint','Grand Rapids','Lansing'],
        'Minnesota':      ['Bloomington','Duluth','Minneapolis','Rochester','Saint Paul'],
        'Mississippi':    ['Biloxi','Gulfport','Hattiesburg','Jackson','Southaven'],
        'Missouri':       ['Columbia','Independence','Kansas City','Springfield','St. Louis'],
        'Montana':        ['Billings','Bozeman','Great Falls','Helena','Missoula'],
        'Nebraska':       ['Bellevue','Lincoln','Omaha'],
        'Nevada':         ['Henderson','Las Vegas','North Las Vegas','Reno','Sparks'],
        'New Hampshire':  ['Concord','Manchester','Nashua'],
        'New Jersey':     ['Elizabeth','Jersey City','Newark','Paterson','Trenton'],
        'New Mexico':     ['Albuquerque','Las Cruces','Rio Rancho','Roswell','Santa Fe'],
        'New York':       ['Brooklyn','Buffalo','Manhattan','Queens','Rochester','Syracuse','Yonkers'],
        'North Carolina': ['Cary','Charlotte','Durham','Greensboro','Raleigh','Winston-Salem'],
        'North Dakota':   ['Bismarck','Fargo','Grand Forks','Minot'],
        'Ohio':           ['Akron','Cincinnati','Cleveland','Columbus','Dayton','Toledo'],
        'Oklahoma':       ['Broken Arrow','Edmond','Norman','Oklahoma City','Tulsa'],
        'Oregon':         ['Eugene','Gresham','Portland','Salem'],
        'Pennsylvania':   ['Allentown','Erie','Philadelphia','Pittsburgh','Reading'],
        'Rhode Island':   ['Cranston','Pawtucket','Providence','Warwick'],
        'South Carolina': ['Charleston','Columbia','Greenville','North Charleston','Rock Hill'],
        'South Dakota':   ['Aberdeen','Rapid City','Sioux Falls'],
        'Tennessee':      ['Chattanooga','Clarksville','Knoxville','Memphis','Nashville'],
        'Texas':          ['Austin','Dallas','El Paso','Fort Worth','Houston','Lubbock','San Antonio'],
        'Utah':           ['Ogden','Provo','Salt Lake City','St. George','West Valley City'],
        'Vermont':        ['Burlington','Essex','Rutland'],
        'Virginia':       ['Arlington','Chesapeake','Norfolk','Richmond','Virginia Beach'],
        'Washington':     ['Bellevue','Seattle','Spokane','Tacoma','Vancouver'],
        'West Virginia':  ['Charleston','Huntington','Morgantown','Parkersburg'],
        'Wisconsin':      ['Green Bay','Kenosha','Madison','Milwaukee','Racine'],
        'Wyoming':        ['Casper','Cheyenne','Gillette','Laramie']
      }
    };

    let currentTab = 'country';
    let selected   = { country: null, state: null, city: null };
    let panelOpen  = false;

    function togglePanel() {
      panelOpen = !panelOpen;
      document.getElementById('locationPanel').classList.toggle('open', panelOpen);
      document.getElementById('locationField').classList.toggle('active', panelOpen);
      if (panelOpen) renderList();
    }

    function switchTab(tab) {
      if (tab === 'state' && !selected.country) return;
      if (tab === 'city'  && !selected.state)   return;
      currentTab = tab;
      ['country','state','city'].forEach(t => {
        document.getElementById('tab-' + t).classList.toggle('active', t === tab);
      });
      renderList();
    }

    function renderList() {
      const list = document.getElementById('optionList');
      list.innerHTML = '';

      if (currentTab === 'country') {
        DATA.countries.forEach(c => {
          list.appendChild(makeOption(c.flag + '  ' + c.name, c.code === selected.country?.code, () => {
            selected = { country: c, state: null, city: null };
            enableTab('state'); disableTab('city');
            switchTab('state'); updateInput();
          }));
        });
      } else if (currentTab === 'state') {
        (DATA.states[selected.country.code] || []).forEach(s => {
          list.appendChild(makeOption(s, s === selected.state, () => {
            selected.state = s; selected.city = null;
            enableTab('city'); switchTab('city'); updateInput();
          }));
        });
      } else if (currentTab === 'city') {
        (DATA.cities[selected.state] || []).forEach(city => {
          list.appendChild(makeOption(city, city === selected.city, () => {
            selected.city = city; updateInput(); closePanel();
          }));
        });
      }
    }

    function makeOption(label, isSelected, onClick) {
      const div = document.createElement('div');
      div.className = 'option-item' + (isSelected ? ' selected' : '');
      div.textContent = label;
      div.onclick = e => { e.stopPropagation(); onClick(); };
      return div;
    }

    function enableTab(id)  { document.getElementById('tab-' + id).classList.remove('disabled'); }
    function disableTab(id) { document.getElementById('tab-' + id).classList.add('disabled'); }

    function updateInput() {
      document.getElementById('locationInput').value =
        [selected.city, selected.state, selected.country?.name].filter(Boolean).join(', ');
    }

    function closePanel() {
      panelOpen = false;
      document.getElementById('locationPanel').classList.remove('open');
      document.getElementById('locationField').classList.remove('active');
    }

    document.addEventListener('click', e => {
      if (!document.querySelector('.location-wrapper').contains(e.target)) closePanel();
    });

    function adjust(id, delta) {
      const el = document.getElementById(id);
      el.textContent = Math.max(0, parseInt(el.textContent) + delta);
    }
  </script>
</body>
</html>
