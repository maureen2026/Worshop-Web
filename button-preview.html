<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Preview</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      font-family: sans-serif;
    }

    .btn-save {
      background-color: #e53935;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-save:hover {
      background-color: #c62828;
    }

    .btn-save:disabled {
      background-color: #ef9a9a;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <button class="btn-save">Save</button>
</body>
</html>
