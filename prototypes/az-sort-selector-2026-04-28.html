<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A–Z Sort Selector — Project Pipeline Board — 2026-04-28</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       DESIGN TOKENS — LeadManager / Project Pipeline
       Source: brief-mandated :root block
    ============================================================ */
    :root {
      --teal:         #03989E;
      --dark-gray:    #454550;
      --medium-gray:  #808080;
      --light-gray:   #E0E0E0;
      --body-gray:    #6A6A73;
      --text-link:    #808083;
      --warning:      #FDA51A;
      --success:      #0DA738;
      --red:          #FF0000;
      --error-light:  #FFE8E8;
      --bg-page:  #F7F7F7;
      --bg-card:  #FBFBFB;
      --bg-alt:   #F7F8FA;
      --surface:  #FFFFFF;
      --f-display: 'Barlow', 'Neuzeit Grotesk', system-ui, sans-serif;
      --f-body:    'Roboto', 'Roboto2', system-ui, sans-serif;
      --s1: 8px;
      --s2: 16px;
      --s3: 24px;
      --s4: 32px;
      --s5: 40px;
      --s6: 48px;
      --r-sm: 4px;
      --r-md: 8px;
      --shadow-card: 0px 0px 1px rgba(0,0,0,0.25), 0px 1px 1px rgba(0,0,0,0.1);

      /* Derived — computed from tokens, not invented */
      --teal-bg:        rgba(3,152,158,0.08);
      --teal-bg-hover:  rgba(3,152,158,0.14);
      --teal-text:      #026268;   /* accessible dark teal for text on light bg */
      --border:         #DCDCE0;
      --hover-bg:       rgba(3,152,158,0.08);
      --selected-bg:    rgba(3,152,158,0.08);
      --shadow-dropdown: 0px 4px 16px rgba(0,0,0,0.14);

      /* Touch floor */
      --touch-min: 44px;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--f-body);
      font-size: 14px;
      color: var(--dark-gray);
      background: var(--bg-page);
      min-height: 100vh;
    }
    button { cursor: pointer; }
    button:focus-visible, [tabindex]:focus-visible {
      outline: 2px solid var(--teal);
      outline-offset: 2px;
    }

    /* ============================================================
       BREAKPOINT TOGGLE BAR
    ============================================================ */
    .bp-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: var(--dark-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--s1);
      z-index: 9999;
      font-family: var(--f-display);
    }
    .bp-bar button {
      font-family: var(--f-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #aaa;
      background: transparent;
      border: 1px solid #555;
      border-radius: var(--r-sm);
      padding: 4px var(--s2);
      transition: all 150ms ease;
      min-height: var(--touch-min);
      min-width: 110px;
    }
    .bp-bar button:hover  { color: #fff; border-color: #888; }
    .bp-bar button.active { color: #fff; background: var(--teal); border-color: var(--teal); }

    /* ============================================================
       STAGE WRAPPER
    ============================================================ */
    .stage-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 64px 24px 48px;
    }
    #stage {
      background: var(--surface);
      border-radius: var(--r-md);
      overflow: visible;
      box-shadow: var(--shadow-card);
      transition: width 200ms ease;
    }

    /* ============================================================
       BOARD TOOLBAR
    ============================================================ */
    .board-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px var(--s3);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      min-height: 56px;
      gap: var(--s2);
      border-radius: var(--r-md) var(--r-md) 0 0;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: var(--s2);
      flex: 1;
    }
    .toolbar-title {
      font-family: var(--f-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--dark-gray);
      white-space: nowrap;
    }
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: var(--s1);
      flex-shrink: 0;
    }

    /* ============================================================
       SORT TRIGGER BUTTON
    ============================================================ */
    .sort-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--f-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--dark-gray);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 0 var(--s1);
      height: var(--touch-min);
      white-space: nowrap;
      transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
      position: relative;
    }
    .sort-btn svg { flex-shrink: 0; }
    .sort-btn:hover {
      background: var(--hover-bg);
      border-color: var(--teal);
    }
    .sort-btn.open,
    .sort-btn:active {
      background: var(--teal-bg);
      border-color: var(--teal);
      color: var(--teal);
    }
    .sort-btn .caret {
      margin-left: 2px;
      transition: transform 200ms ease;
    }
    .sort-btn.open .caret { transform: rotate(180deg); }

    /* ============================================================
       SORT DROPDOWN PANEL
    ============================================================ */
    .sort-wrapper {
      position: relative;
      display: inline-block;
    }
    .sort-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      min-width: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-dropdown);
      z-index: 200;
      overflow: hidden;
    }
    .sort-dropdown.hidden { display: none; }

    .dropdown-header {
      padding: 8px var(--s2);
      font-family: var(--f-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--body-gray);
      border-bottom: 1px solid var(--border);
    }

    /* ============================================================
       SORT OPTION ROW
    ============================================================ */
    .sort-option {
      display: flex;
      align-items: center;
      gap: var(--s1);
      padding: 0 var(--s2);
      height: var(--touch-min);
      cursor: pointer;
      font-family: var(--f-body);
      font-size: 13px;
      font-weight: 400;
      color: var(--dark-gray);
      background: var(--surface);
      border: none;
      width: 100%;
      text-align: left;
      transition: background 120ms ease;
      position: relative;
    }
    .sort-option:hover { background: var(--hover-bg); }
    .sort-option:focus-visible {
      outline: 2px solid var(--teal);
      outline-offset: -2px;
      z-index: 1;
    }
    .sort-option.selected {
      background: var(--selected-bg);
      color: var(--teal);
      font-weight: 500;
    }

    /* Icon slot */
    .option-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .option-icon svg { width: 16px; height: 16px; }

    /* Default icon color */
    .option-icon svg .icon-stroke { stroke: var(--dark-gray); }
    .option-icon svg .icon-fill   { fill:   var(--dark-gray); }

    /* Selected icon color */
    .sort-option.selected .option-icon svg .icon-stroke { stroke: var(--teal); }
    .sort-option.selected .option-icon svg .icon-fill   { fill:   var(--teal); }

    /* Option label — flex: 1 pushes check and badge to right */
    .option-label {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Check mark on right */
    .option-check {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .sort-option.selected .option-check { display: flex; }

    /* NEW badge */
    .new-badge {
      font-family: var(--f-display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--surface);
      background: var(--teal);
      border-radius: 3px;
      padding: 1px 4px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ============================================================
       BOARD BODY
    ============================================================ */
    .board-body {
      padding: var(--s3);
      background: var(--bg-alt);
      min-height: 180px;
      border-radius: 0 0 var(--r-md) var(--r-md);
    }
    .board-placeholder {
      font-family: var(--f-body);
      font-size: 13px;
      color: var(--body-gray);
      text-align: center;
      padding: var(--s4) 0;
    }

    /* ============================================================
       STATES REVIEW SECTION
    ============================================================ */
    .states-section {
      padding: var(--s3) var(--s3) var(--s4);
      background: var(--bg-page);
    }
    .states-title {
      font-family: var(--f-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--body-gray);
      margin-bottom: var(--s2);
      margin-top: var(--s3);
    }
    .states-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--s3);
      align-items: flex-start;
    }
    .state-card {
      background: var(--surface);
      border-radius: var(--r-md);
      padding: var(--s2);
      box-shadow: var(--shadow-card);
    }
    .state-label {
      font-family: var(--f-display);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--body-gray);
      margin-bottom: var(--s1);
    }

    /* Simulated states for static review */
    .sort-btn.sim-hover {
      background: var(--hover-bg);
      border-color: var(--teal);
    }
    .sort-btn.sim-active {
      background: var(--teal-bg);
      border-color: var(--teal);
      color: var(--teal);
    }

    /* Static dropdown for states panel */
    .sort-dropdown.static-show {
      display: block !important;
      position: static;
      box-shadow: var(--shadow-dropdown);
      margin-top: var(--s1);
    }

    /* ============================================================
       MOBILE ADAPTATIONS (applied via JS at 375)
    ============================================================ */
    .mobile-layout .board-toolbar {
      flex-wrap: wrap;
      padding: 8px var(--s2);
    }
    .mobile-layout .toolbar-title {
      font-size: 15px;
    }
    .mobile-layout .sort-dropdown {
      right: auto;
      left: 0;
    }
  </style>
</head>
<body>

<!-- ================================================================
     BREAKPOINT TOGGLE BAR
================================================================ -->
<div class="bp-bar" role="toolbar" aria-label="Breakpoint selector">
  <button class="active" onclick="setBreakpoint(1280, this)">Desktop 1280</button>
  <button onclick="setBreakpoint(768, this)">Tablet 768</button>
  <button onclick="setBreakpoint(375, this)">Mobile 375</button>
</div>

<!-- ================================================================
     STAGE — live interactive demo
================================================================ -->
<div class="stage-wrap">
  <div id="stage" style="width:1200px;">

    <!-- Board Toolbar -->
    <div class="board-toolbar" id="mainToolbar">
      <div class="toolbar-left">
        <span class="toolbar-title">Project Pipeline</span>
      </div>
      <div class="toolbar-right">

        <!-- Filter button (context only) -->
        <button class="sort-btn" type="button" aria-label="Filter projects">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <line x1="2" y1="5" x2="14" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="4" y1="8.5" x2="12" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="6" y1="12" x2="10" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Filter
        </button>

        <!-- SORT BUTTON + DROPDOWN -->
        <div class="sort-wrapper" id="sortWrapper">
          <button
            class="sort-btn"
            type="button"
            id="sortTrigger"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="sortDropdown"
            onclick="toggleSort()"
          >
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="2" y1="8" x2="10" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="2" y1="12" x2="7" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Sort
            <svg class="caret" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <polyline points="2,4 6,8 10,4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <!-- DROPDOWN PANEL -->
          <div
            class="sort-dropdown hidden"
            id="sortDropdown"
            role="listbox"
            aria-label="Sort options"
          >
            <div class="dropdown-header">Sort by</div>

            <!-- Deadline (existing, default selected) -->
            <button class="sort-option selected" role="option" aria-selected="true" data-value="deadline" onclick="selectSort(this)">
              <span class="option-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none">
                  <rect x="1.5" y="2.5" width="13" height="12" rx="1.5" class="icon-stroke" stroke-width="1.4"/>
                  <line x1="1.5" y1="6" x2="14.5" y2="6" class="icon-stroke" stroke-width="1.4"/>
                  <line x1="5" y1="1" x2="5" y2="4" class="icon-stroke" stroke-width="1.4" stroke-linecap="round"/>
                  <line x1="11" y1="1" x2="11" y2="4" class="icon-stroke" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="option-label">Deadline</span>
              <span class="option-check" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <polyline points="2,7 5.5,10.5 12,4" stroke="var(--teal)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </button>

            <!-- Date Added (existing) -->
            <button class="sort-option" role="option" aria-selected="false" data-value="date-added" onclick="selectSort(this)">
              <span class="option-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="8" r="6" class="icon-stroke" stroke-width="1.4"/>
                  <polyline points="8,5 8,8 10.5,10" class="icon-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span class="option-label">Date Added</span>
              <span class="option-check" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <polyline points="2,7 5.5,10.5 12,4" stroke="var(--teal)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </button>

            <!-- Stage (existing) -->
            <button class="sort-option" role="option" aria-selected="false" data-value="stage" onclick="selectSort(this)">
              <span class="option-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none">
                  <rect x="2" y="3"    width="12" height="2.5" rx="1" class="icon-stroke" stroke-width="1.3"/>
                  <rect x="2" y="6.75" width="12" height="2.5" rx="1" class="icon-stroke" stroke-width="1.3"/>
                  <rect x="2" y="10.5" width="12" height="2.5" rx="1" class="icon-stroke" stroke-width="1.3"/>
                </svg>
              </span>
              <span class="option-label">Stage</span>
              <span class="option-check" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <polyline points="2,7 5.5,10.5 12,4" stroke="var(--teal)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </button>

            <!-- ===================================================
                 NEW — A–Z Project Name
                 Icon: TNLMIcon icon="alert-list"
                 (rendered as inline SVG: bulleted list rows
                  with filled circle lead — alert-list pattern)
            =================================================== -->
            <button class="sort-option" role="option" aria-selected="false" data-value="az-project-name" onclick="selectSort(this)">
              <span class="option-icon" aria-hidden="true">
                <!--
                  Inline SVG stand-in for <TNLMIcon icon="alert-list" />
                  Three rows, each with a filled circle bullet on the left
                  and a horizontal line (alert list / ordered list pattern).
                -->
                <svg viewBox="0 0 16 16" fill="none">
                  <circle cx="3" cy="4.5" r="1.5" class="icon-fill"/>
                  <line x1="6.5" y1="4.5" x2="14" y2="4.5" class="icon-stroke" stroke-width="1.4" stroke-linecap="round"/>
                  <circle cx="3" cy="8"   r="1.5" class="icon-fill"/>
                  <line x1="6.5" y1="8"   x2="14" y2="8"   class="icon-stroke" stroke-width="1.4" stroke-linecap="round"/>
                  <circle cx="3" cy="11.5" r="1.5" class="icon-fill"/>
                  <line x1="6.5" y1="11.5" x2="14" y2="11.5" class="icon-stroke" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="option-label">
                A–Z Project Name
                <span class="new-badge" aria-label="New option">NEW</span>
              </span>
              <span class="option-check" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <polyline points="2,7 5.5,10.5 12,4" stroke="var(--teal)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </button>

          </div><!-- /sort-dropdown -->
        </div><!-- /sort-wrapper -->

      </div><!-- /toolbar-right -->
    </div><!-- /board-toolbar -->

    <!-- Board body placeholder -->
    <div class="board-body">
      <p class="board-placeholder">Project cards render here — sorted by the active option above.</p>
    </div>

  </div><!-- /#stage -->
</div><!-- /.stage-wrap -->


<!-- ================================================================
     STATES REVIEW SECTION — all states displayed inline
================================================================ -->
<div class="states-section">

  <!-- ---- Sort Button States ---- -->
  <p class="states-title">Sort Button States</p>
  <div class="states-row">

    <div class="state-card">
      <div class="state-label">Default</div>
      <button class="sort-btn" type="button" style="pointer-events:none;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="8" x2="10" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="12" x2="7" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Sort
        <svg class="caret" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <polyline points="2,4 6,8 10,4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="state-card">
      <div class="state-label">Hover (desktop)</div>
      <button class="sort-btn sim-hover" type="button" style="pointer-events:none;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="8" x2="10" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="12" x2="7" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Sort
        <svg class="caret" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <polyline points="2,4 6,8 10,4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="state-card">
      <div class="state-label">Open (active)</div>
      <button class="sort-btn sim-active open" type="button" style="pointer-events:none;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="8" x2="10" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="12" x2="7" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Sort
        <svg class="caret" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <polyline points="2,4 6,8 10,4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>

  <!-- ---- Dropdown — Full Panel ---- -->
  <p class="states-title">Dropdown — Full Panel</p>
  <div class="states-row">

    <!-- Default selection: Deadline -->
    <div class="state-card" style="min-width:252px;">
      <div class="state-label">Default selected: Deadline</div>
      <div class="sort-dropdown static-show" role="listbox">
        <div class="dropdown-header">Sort by</div>
        <button class="sort-option selected" role="option" aria-selected="true" style="pointer-events:none;">
          <span class="option-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16" fill="none">
              <rect x="1.5" y="2.5" width="13" height="12" rx="1.5" stroke="var(--teal)" stroke-width="1.4"/>

<!-- ================================================================
     JS — Toggle, selection, breakpoint
================================================================ -->
<script>
  /* ---- Sort dropdown toggle ---- */
  function toggleSort() {
    const dropdown = document.getElementById('sortDropdown');
    const trigger  = document.getElementById('sortTrigger');
    const isOpen   = !dropdown.classList.contains('hidden');
    if (isOpen) {
      dropdown.classList.add('hidden');
      trigger.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
    } else {
      dropdown.classList.remove('hidden');
      trigger.classList.add('open');
      trigger.setAttribute('aria-expanded', 'true');
    }
  }

  /* ---- Select a sort option ---- */
  function selectSort(el) {
    const all = el.closest('[role="listbox"]').querySelectorAll('.sort-option');
    all.forEach(function(opt) {
      opt.classList.remove('selected');
      opt.setAttribute('aria-selected', 'false');
    });
    el.classList.add('selected');
    el.setAttribute('aria-selected', 'true');
    const dropdown = document.getElementById('sortDropdown');
    const trigger  = document.getElementById('sortTrigger');
    dropdown.classList.add('hidden');
    trigger.classList.remove('open');
    trigger.setAttribute('aria-expanded', 'false');
    trigger.focus();
  }

  /* ---- Close on outside click ---- */
  document.addEventListener('click', function(e) {
    const wrapper = document.getElementById('sortWrapper');
    if (!wrapper.contains(e.target)) {
      const dropdown = document.getElementById('sortDropdown');
      const trigger  = document.getElementById('sortTrigger');
      dropdown.classList.add('hidden');
      trigger.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
    }
  });

  /* ---- Keyboard navigation ---- */
  document.getElementById('sortDropdown').addEventListener('keydown', function(e) {
    const options = Array.from(this.querySelectorAll('.sort-option'));
    const idx     = options.indexOf(document.activeElement);
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (idx < options.length - 1) options[idx + 1].focus();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (idx > 0) options[idx - 1].focus();
      else document.getElementById('sortTrigger').focus();
    } else if (e.key === 'Escape') {
      toggleSort();
      document.getElementById('sortTrigger').focus();
    }
  });

  /* ---- Breakpoint toggle ---- */
  function setBreakpoint(width, btn) {
    document.querySelectorAll('.bp-bar button').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    const stage   = document.getElementById('stage');
    const toolbar = document.getElementById('mainToolbar');
    stage.style.width = width + 'px';
    if (width <= 375) {
      stage.classList.add('mobile-layout');
      toolbar.classList.add('mobile-layout');
    } else {
      stage.classList.remove('mobile-layout');
      toolbar.classList.remove('mobile-layout');
    }
  }

  /* ---- Reduced motion ---- */
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.documentElement.style.setProperty('--transition', 'none');
  }
</script>
